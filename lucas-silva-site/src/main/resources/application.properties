# =====================================================
# Configurações da aplicação Lucas Silva Official Site
# =====================================================

# Nome da aplicação e porta do servidor embarcado
spring.application.name=lucas-silva-site
server.port=8080

# -----------------------------------------------------
# Conexão com o banco de dados MySQL
# -----------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/lucassilva_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -----------------------------------------------------
# Configurações JPA / Hibernate
# -----------------------------------------------------
# update -> mantém as tabelas e ajusta o schema conforme as entidades
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# -----------------------------------------------------
# Thymeleaf (templates HTML)
# -----------------------------------------------------
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# -----------------------------------------------------
# Upload de imagens (notícias / galeria)
# -----------------------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# -----------------------------------------------------
# Codificação UTF-8 para acentuação correta
# -----------------------------------------------------
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
